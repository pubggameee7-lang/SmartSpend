<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSpend - Budget Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="chat-page">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">Smart<span>Spend</span></h1>
      <p class="disclaimer">Not a financial advisor - for educational purposes only.</p>
    </div>
    <div class="header-right">
      <span id="user-email" class="user-email"></span>
      <a href="dashboard.html" class="btn-secondary">Dashboard</a>
      <button id="logout-btn" class="btn-outline">Log Out</button>
    </div>
  </header>

  <!-- Main layout -->
  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <button id="new-session-btn" class="btn-primary full-width">+ New Session</button>
      <div id="session-list" class="session-list"></div>
    </aside>

    <!-- Chat area -->
    <main class="chat-main">
      <div id="chat-box" class="chat-box"></div>
      <div id="quick-replies-container" class="quick-replies-container"></div>
      <div class="input-area">
        <textarea
          id="user-input"
          placeholder="Type your message here..."
          rows="2"
        ></textarea>
        <button id="send-btn" class="btn-primary">Send</button>
      </div>
    </main>

  </div>

  <script src="js/chat.js"></script>

</body>
</html>
