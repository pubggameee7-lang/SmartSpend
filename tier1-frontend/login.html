<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSpend — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="logo">Smart<span>Spend</span></h1>
      <p class="tagline">AI Budget Assistant</p>
      <p class="disclaimer">Not a financial advisor. For educational purposes only.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>
        <div id="error-msg" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary">Log In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>

</body>
</html>
